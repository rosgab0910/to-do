<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <h1>Minhas Tarefas</h1>

    <div class="input-row">
        <input type="text" id="taskInput" placeholder="Nova tarefa...">
        <button id="taskBtn">Adicionar</button>
        <button id="clearAllBtn">Limpar</button>
    </div>

    <p id="taskCounter">0 tarefas</p>

    <ul id="taskList"></ul>

    <button id="clearCompletedBtn">Limpar Concluídas</button>
</body>
</html>
